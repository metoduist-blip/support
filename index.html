<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>CryptoCasino — Support</title>
<meta name="theme-color" content="#000000">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--silver:#C0C8D8;--dim:rgba(255,255,255,.5);--r:10px;--card-bg:radial-gradient(ellipse 110% 75% at 0% 0%,#0f2547 0%,transparent 55%),radial-gradient(ellipse 110% 75% at 100% 100%,#0f2547 0%,transparent 55%),#000;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:#000;font-family:'Inter',sans-serif;color:#fff;min-height:100vh;display:flex;flex-direction:column;}
button,input,textarea{font-family:'Inter',sans-serif;}

#login{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px;}
.login-title{font-size:18px;font-weight:900;letter-spacing:2px;color:#fff;}
.login-sub{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:2px;font-weight:600;}
.login-card{background:var(--card-bg);border:1.5px solid var(--silver);border-radius:14px;padding:24px;width:100%;max-width:340px;display:flex;flex-direction:column;gap:14px;}
.login-in{width:100%;height:46px;padding:0 14px;background:#000;border:1.5px solid var(--silver);border-radius:var(--r);color:#fff;font-size:16px;letter-spacing:4px;text-align:center;font-weight:700;outline:none;transition:.2s;}
.login-in:focus{border-color:#fff;}
.login-in::placeholder{letter-spacing:1px;font-size:13px;font-weight:500;color:rgba(255,255,255,.3);}
.login-btn{width:100%;height:44px;border:1.5px solid var(--silver);border-radius:var(--r);background:transparent;color:#fff;font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:.15s;}
.login-btn:hover{background:rgba(255,255,255,.05);}
.login-err{font-size:12px;color:#ff4d4d;font-weight:600;text-align:center;min-height:14px;}

#app{display:none;flex:1;flex-direction:column;overflow:hidden;}
#app.on{display:flex;}

.app-hdr{height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.app-hdr-title{font-size:14px;font-weight:700;}
.app-hdr-name{font-size:11px;color:var(--silver);}

.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.tab{flex:1;height:40px;border:none;background:transparent;color:var(--dim);font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:.15s;}
.tab.on{color:#fff;border-bottom-color:#fff;}

.chat-list{flex:1;overflow-y:auto;padding:8px;}
.chat-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--r);cursor:pointer;transition:.12s;border:1px solid transparent;margin-bottom:4px;}
.chat-item:hover{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.06);}
.chat-item.unread{background:rgba(26,79,214,.08);border-color:rgba(26,79,214,.2);}
.chat-avatar{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--silver);flex-shrink:0;}
.chat-info{flex:1;min-width:0;}
.chat-name{font-size:13px;font-weight:700;color:#fff;}
.chat-preview{font-size:11px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;}
.chat-time{font-size:10px;color:rgba(255,255,255,.3);flex-shrink:0;}
.chat-badge{width:8px;height:8px;border-radius:50%;background:#1a4fd6;flex-shrink:0;}

.chat-view{display:none;flex:1;flex-direction:column;overflow:hidden;position:relative;}
.chat-view.on{display:flex;}
.chat-view-hdr{height:48px;display:flex;align-items:center;gap:12px;padding:0 14px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.chat-back{width:32px;height:32px;border-radius:8px;border:1px solid rgba(192,200,216,.3);background:transparent;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;}
.chat-view-name{font-size:14px;font-weight:700;}
.chat-msgs{flex:1;overflow-y:auto;padding:14px 14px 8px;display:flex;flex-direction:column;gap:8px;position:relative;}
.msg{max-width:80%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word;}
.msg.user{align-self:flex-start;background:#000;border:1px solid rgba(192,200,216,.4);box-shadow:inset 0 0 14px rgba(192,200,216,.06);color:#fff;border-bottom-left-radius:4px;}
.msg.agent{align-self:flex-end;background:#000;border:1px solid rgba(192,200,216,.4);box-shadow:inset 0 0 14px rgba(192,200,216,.06);color:#fff;border-bottom-right-radius:4px;}
.msg-time{font-size:9px;color:rgba(255,255,255,.3);margin-top:4px;}
.msg-img{max-width:200px;border-radius:10px;cursor:pointer;}
.chat-input-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.chat-input{flex:1;height:40px;padding:0 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:20px;color:#fff;font-size:13px;outline:none;}
.chat-input:focus{border-color:rgba(255,255,255,.2);}
.chat-input::placeholder{color:rgba(255,255,255,.3);}
.chat-send{width:36px;height:36px;border-radius:50%;border:none;background:rgba(26,79,214,.5);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;}
.chat-send:hover{background:rgba(26,79,214,.7);}

.watermark{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1;opacity:.04;}
.watermark-text{position:absolute;font-size:28px;font-weight:900;color:#fff;white-space:nowrap;transform:rotate(-30deg);letter-spacing:6px;text-transform:uppercase;}

.global-watermark{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;opacity:.03;}
.global-watermark .watermark-text{position:absolute;font-size:28px;font-weight:900;color:#fff;white-space:nowrap;transform:rotate(-30deg);letter-spacing:6px;text-transform:uppercase;}
#app{position:relative;z-index:1;}
#login{position:relative;z-index:1;}
.lock-screen{position:fixed;inset:0;z-index:9999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.lock-screen i{font-size:48px;color:rgba(255,255,255,.3);}
.empty-msg{text-align:center;padding:40px 16px;color:var(--dim);font-size:12px;}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--card-bg);border:1.5px solid var(--silver);color:#fff;padding:10px 18px;border-radius:var(--r);font-size:12px;font-weight:700;opacity:0;transition:.25s;z-index:9999;pointer-events:none;white-space:nowrap;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="login">
  <div class="login-title">SUPPORT PANEL</div>
  
  <div class="login-card">
    <input class="login-in" id="code-in" placeholder="Enter access code" maxlength="12" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-err" id="login-err"></div>
    <button class="login-btn" onclick="doLogin()">ENTER</button>
  </div>
</div>

<div id="app">
  <div class="app-hdr">
    <div class="app-hdr-title">Support</div>
    <div class="app-hdr-name" id="agent-name"></div>
  </div>
  <div class="tabs">
    <button class="tab on" id="tab-unread" onclick="switchTab('unread')">Unread</button>
    <button class="tab" id="tab-unanswered" onclick="switchTab('unanswered')">Unanswered</button>
    <button class="tab" id="tab-answered" onclick="switchTab('answered')">Answered</button>
  </div>
  <div class="chat-list" id="chat-list"></div>
  <div class="chat-view" id="chat-view">
    <div class="chat-view-hdr">
      <button class="chat-back" onclick="closeChat()"><i class="fas fa-arrow-left"></i></button>
      <div class="chat-view-name" id="chat-view-name"></div>
    </div>
    <div class="chat-msgs" id="chat-msgs">
      <div class="watermark" id="watermark"></div>
    </div>
    <div class="chat-input-bar">
      <input class="chat-input" id="chat-input" placeholder="Type a reply..." onkeydown="if(event.key==='Enter')sendReply()">
      <button class="chat-send" onclick="sendReply()"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
</div>

<div class="global-watermark" id="global-wm"></div>
<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyCKD4r6pVA4QRQxOt9zsJ2icBghkPK3_qU",
  authDomain:"solar-power-ono.firebaseapp.com",
  databaseURL:"https://solar-power-ono-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"solar-power-ono",
  storageBucket:"solar-power-ono.firebasestorage.app",
  messagingSenderId:"263040168510",
  appId:"1:263040168510:web:46517e20c66bacbfabd76f"
});
const db=firebase.database();
let agentCode='';
let agentName='';
let currentChatKey=null;
let currentTab='unread';
let sessionStart=0;

async function doLogin(){
  const code=(document.getElementById('code-in').value||'').trim().toUpperCase();
  const err=document.getElementById('login-err');
  err.textContent='';
  if(!code){err.textContent='Enter your access code.';return;}

  const lockSnap=await db.ref('support_config/locked').get();
  if(lockSnap.exists()&&lockSnap.val()===true){
    document.getElementById('login').innerHTML='<div style="flex:1;display:flex;align-items:center;justify-content:center;"><i class="fas fa-lock" style="font-size:48px;color:rgba(255,255,255,.25);"></i></div>';
    return;
  }

  const snap=await db.ref('support_agents/'+code).get();
  if(!snap.exists()){err.textContent='Invalid code.';return;}
  const agent=snap.val();

  await db.ref('support_agents/'+code+'/used').set(true);
  await db.ref('support_agents/'+code+'/lastLogin').set(Date.now());

  agentCode=code;
  agentName=agent.name||'Agent';
  sessionStart=Date.now();

  document.getElementById('login').style.display='none';
  document.getElementById('app').classList.add('on');
  document.getElementById('agent-name').textContent=agentName;
  buildGlobalWatermark(agentName);
  loadChats();
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  const el=document.getElementById('tab-'+tab);
  if(el)el.classList.add('on');
  loadChats();
}

function loadChats(){
  db.ref('support_chats').on('value',snap=>{
    const list=document.getElementById('chat-list');
    if(!snap.exists()){list.innerHTML='<div class="empty-msg">No conversations.</div>';return;}
    const chats=snap.val();
    const entries=Object.entries(chats).map(([key,chat])=>{
      const last=chat.lastMsg||{};
      const info=chat.userInfo||{};
      const hasUnread=last.from==='user'&&!last.read;
      return {key,info,last,hasUnread};
    }).sort((a,b)=>(b.last.ts||0)-(a.last.ts||0));

    let filtered;
    if(currentTab==='unread')filtered=entries.filter(e=>e.hasUnread);
    else if(currentTab==='unanswered')filtered=entries.filter(e=>!e.hasUnread&&e.last.from==='user');
    else filtered=entries.filter(e=>!e.hasUnread&&e.last.from==='agent');
    if(!filtered.length){
      list.innerHTML='<div class="empty-msg">No '+currentTab+' messages.</div>';
      return;
    }

    list.innerHTML=filtered.map(e=>{
      const nm=e.info.name||e.info.email||e.key;
      const initials=(nm.split(' ').map(w=>w[0]||'').join('').substring(0,2)).toUpperCase();
      const preview=e.last.text||'';
      const d=new Date(e.last.ts||0);
      const time=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
      const cls=e.hasUnread?'chat-item unread':'chat-item';
      const badge=e.hasUnread?'<div class="chat-badge"></div>':'';
      return '<div class="'+cls+'" onclick="openChat(\''+e.key+'\')"><div class="chat-avatar">'+initials+'</div><div class="chat-info"><div class="chat-name">'+nm+'</div><div class="chat-preview">'+preview+'</div></div><div class="chat-time">'+time+'</div>'+badge+'</div>';
    }).join('');
  });
}

function openChat(key){
  currentChatKey=key;
  document.getElementById('chat-list').style.display='none';
  document.querySelector('.tabs').style.display='none';
  const view=document.getElementById('chat-view');
  view.classList.add('on');

  db.ref('support_chats/'+key+'/userInfo').once('value').then(snap=>{
    const info=snap.val()||{};
    const nm=info.name||info.email||key;
    document.getElementById('chat-view-name').textContent=nm;
    buildWatermark(nm);
  });

  db.ref('support_chats/'+key+'/lastMsg/read').set(true);

  db.ref('support_chats/'+key+'/messages').orderByChild('ts').on('value',snap=>{
    const msgs=document.getElementById('chat-msgs');
    const wm=document.getElementById('watermark');
    msgs.innerHTML='';
    msgs.appendChild(wm);
    if(!snap.exists())return;
    const all=snap.val();
    Object.keys(all).sort((a,b)=>(all[a].ts||0)-(all[b].ts||0)).forEach(k=>{
      const m=all[k];
      const div=document.createElement('div');
      div.className='msg '+(m.from==='user'?'user':'agent');
      div.style.position='relative';
      div.style.zIndex='2';
      if(m.from==='agent'){
        let _lp=null;
        div.ontouchstart=function(){_lp=setTimeout(function(){editMessage(k);},600);};
        div.ontouchend=function(){clearTimeout(_lp);};
        div.oncontextmenu=function(e){e.preventDefault();editMessage(k);};
      }
      let content='';
      if(m.imageUrl)content+='<img class="msg-img" src="'+m.imageUrl+'" onclick="window.open(this.src)">';
      if(m.text)content+='<div>'+(m.text||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>';
      if(m.edited)content+='<div class="msg-time" style="font-style:italic;">edited</div>';
      const d=new Date(m.ts||0);
      content+='<div class="msg-time">'+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')+'</div>';
      div.innerHTML=content;
      msgs.appendChild(div);
    });
    msgs.scrollTop=msgs.scrollHeight;
  });
}

function buildWatermark(name){
  const wm=document.getElementById('watermark');
  wm.innerHTML='';
  for(let y=-50;y<600;y+=120){
    for(let x=-100;x<500;x+=280){
      const span=document.createElement('div');
      span.className='watermark-text';
      span.style.top=y+'px';
      span.style.left=x+'px';
      span.textContent=name;
      wm.appendChild(span);
    }
  }
}
function buildGlobalWatermark(name){
  const wm=document.getElementById('global-wm');
  wm.innerHTML='';
  for(let y=-50;y<2000;y+=120){
    for(let x=-200;x<800;x+=280){
      const span=document.createElement('div');
      span.className='watermark-text';
      span.style.top=y+'px';
      span.style.left=x+'px';
      span.textContent=name;
      wm.appendChild(span);
    }
  }
}

function closeChat(){
  if(currentChatKey){
    db.ref('support_chats/'+currentChatKey+'/messages').off();
  }
  currentChatKey=null;
  document.getElementById('chat-view').classList.remove('on');
  document.getElementById('chat-list').style.display='';
  document.querySelector('.tabs').style.display='';

  if(agentCode){
    const elapsed=Date.now()-sessionStart;
    db.ref('support_agents/'+agentCode+'/totalTime').get().then(snap=>{
      const old=snap.exists()?snap.val():0;
      db.ref('support_agents/'+agentCode+'/totalTime').set(old+elapsed);
    });
    sessionStart=Date.now();
  }
}

function sendReply(){
  if(!currentChatKey)return;
  const inp=document.getElementById('chat-input');
  const text=(inp.value||'').trim();
  if(!text)return;
  inp.value='';
  const ref=db.ref('support_chats/'+currentChatKey+'/messages').push();
  ref.set({text:text,from:'agent',agentName:agentName,ts:Date.now(),read:true});
  db.ref('support_chats/'+currentChatKey+'/lastMsg').set({text:text,from:'agent',ts:Date.now(),read:true});
  if(agentCode){
    db.ref('support_agents/'+agentCode+'/totalMessages').get().then(snap=>{
      db.ref('support_agents/'+agentCode+'/totalMessages').set((snap.exists()?snap.val():0)+1);
    });
  }
}

function editMessage(msgKey){
  if(!currentChatKey)return;
  db.ref('support_chats/'+currentChatKey+'/messages/'+msgKey).once('value').then(snap=>{
    if(!snap.exists())return;
    const m=snap.val();
    if(m.from!=='agent')return;
    const newText=prompt('Edit message:',m.text||'');
    if(newText===null||newText===m.text)return;
    db.ref('support_chats/'+currentChatKey+'/messages/'+msgKey).update({
      text:newText,
      edited:true,
      editedAt:Date.now()
    });
    if(agentCode){
      db.ref('support_agents/'+agentCode+'/totalEdits').get().then(s=>{
        db.ref('support_agents/'+agentCode+'/totalEdits').set((s.exists()?s.val():0)+1);
      });
    }
  });
}

let _tt=null;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='on';
  if(_tt)clearTimeout(_tt);
  _tt=setTimeout(()=>{el.className='';},2600);
}

document.getElementById('code-in').focus();
</script>
</body>
</html>
